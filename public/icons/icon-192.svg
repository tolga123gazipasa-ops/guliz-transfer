<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Koyu lacivert arka plan -->
  <rect width="192" height="192" rx="34" fill="#0D1F5C"/>
  <!-- Üst kırmızı şerit -->
  <rect x="0" y="0" width="192" height="50" rx="34" fill="#CC1F2D"/>
  <rect x="0" y="30" width="192" height="20" fill="#CC1F2D"/>
  <!-- Alt mavi şerit -->
  <rect x="0" y="142" width="192" height="50" rx="34" fill="#1A3A8F"/>
  <rect x="0" y="142" width="192" height="20" fill="#1A3A8F"/>
  <!-- GLZ büyük harfler - beyaz -->
  <text x="96" y="122" font-family="Arial Black, Arial, sans-serif" font-size="70" font-weight="900"
        fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">GLZ</text>
  <!-- GÜLİZ yazısı -->
  <text x="96" y="38" font-family="Arial, sans-serif" font-size="17" font-weight="700"
        fill="#FFFFFF" text-anchor="middle" letter-spacing="7">GÜLİZ</text>
  <!-- LOJİSTİK yazısı -->
  <text x="96" y="167" font-family="Arial, sans-serif" font-size="14" font-weight="600"
        fill="#FFFFFF" text-anchor="middle" letter-spacing="5">LOJİSTİK</text>
</svg>
