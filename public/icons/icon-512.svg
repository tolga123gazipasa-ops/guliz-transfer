<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Koyu lacivert arka plan -->
  <rect width="512" height="512" rx="90" fill="#0D1F5C"/>
  <!-- Üst kırmızı şerit -->
  <rect x="0" y="0" width="512" height="130" rx="90" fill="#CC1F2D"/>
  <rect x="0" y="80" width="512" height="50" fill="#CC1F2D"/>
  <!-- Alt mavi şerit -->
  <rect x="0" y="382" width="512" height="130" rx="90" fill="#1A3A8F"/>
  <rect x="0" y="382" width="512" height="50" fill="#1A3A8F"/>
  <!-- GLZ büyük harfler - beyaz -->
  <text x="256" y="310" font-family="Arial Black, Arial, sans-serif" font-size="185" font-weight="900"
        fill="#FFFFFF" text-anchor="middle" letter-spacing="-5">GLZ</text>
  <!-- GÜLİZ yazısı - kırmızı şerit üstünde beyaz -->
  <text x="256" y="100" font-family="Arial, sans-serif" font-size="46" font-weight="700"
        fill="#FFFFFF" text-anchor="middle" letter-spacing="18">GÜLİZ</text>
  <!-- LOJİSTİK yazısı - alt mavi şeritte beyaz -->
  <text x="256" y="446" font-family="Arial, sans-serif" font-size="38" font-weight="600"
        fill="#FFFFFF" text-anchor="middle" letter-spacing="14">LOJİSTİK</text>
</svg>
